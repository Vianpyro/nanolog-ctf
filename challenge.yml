name: Unsound Memories
author: Vianpyro
category: PWN

description: |
  🇫🇷 Les moniteurs ont retrouvé une copie de NanoLog sur un ancien ordinateur de Claude.

  Les journaux semblent avoir été effacés peu avant sa disparition.

  Selon plusieurs témoignages, Claude utilisait cet outil pour conserver ses observations sur les étranges phénomènes observés autour du lac Pas Beaucoup d'Eau.

  Si Claude a réellement découvert un moyen d'arrêter les nanobots, il est possible qu'une trace subsiste encore quelque part dans le programme.

  🇬🇧 The camp counselors recovered a copy of NanoLog from one of Claude's old computers.

  The logs appear to have been erased shortly before the disappearance.

  According to several accounts, Claude used this tool to record observations related to the strange phenomena reported around Lake Not Much Water.

  If a way to stop the nanobots was ever discovered, traces of that discovery may still remain somewhere within the program.

  Format: `DCI{...}`

attribution: "Written by [Vianpyro](https://github.com/Vianpyro)"

type: dynamic
extra:
  initial: 500
  decay: 100
  minimum: 20

image: ghcr.io/vianpyro/nanolog-ctf:latest

protocol: tcp
host: null
connection_info: nc <host> 1337

solution:
  path: solution/README.md
  state: hidden

flags:
  - {
      type: "static",
      content: "DCI{N4n0L0g_Adm1n_Byp4ss_9a6295810c1b}",
      data: "case_sensitive"
    }

# Only visible to admins
topics:
  - heap
  - tcache
  - use-after-free
  - rust
  - glibc-2.35

tags:
  - rust

files:
  - src/

hints:
  - content: "Rust garantit la sûreté mémoire *si et seulement si* le compilateur accepte votre code pour les bonnes raisons."

# next: null

version: "1.1"

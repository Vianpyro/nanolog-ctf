name: Deeper Memories
author: Vianpyro
category: PWN

description: |
  Les journaux de Claude étaient chiffrés, mais les nanobots ont laissé des traces bien plus profondes dans la mémoire du programme.

  Pas dans les journaux. Pas dans les données.

  Dans la façon dont le programme se souvient et oublie.

  Claude's logs were encrypted, but the nanobots left far deeper traces inside the program's memory.

  Not in the logs. Not in the data.

  In the way the program remembers and forgets.

  Format: `DCI{...}`

attribution: "Written by [Vianpyro](https://github.com/Vianpyro)"

type: dynamic
extra:
  initial: 500
  decay: 100
  minimum: 20

protocol: tcp
host: null
connection_info: nc <host> 1337

flags:
  - {
      type: "static",
      content: "DCI{N4n0L0g_L1bc_L34k_DC4svjxQ}",
      data: "case_sensitive"
    }

# Only visible to admins
topics:
  - heap
  - tcache
  - unsorted-bin
  - libc-leak
  - use-after-free
  - callback-hijack
  - rust
  - glibc-2.35

tags:
  - pwn
  - A:Vianpyro

files:
  - unsound-memories.zip

requirements:
  - Unsound Memories
